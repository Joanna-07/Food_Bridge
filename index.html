<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodBridge | Food Donation Network</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <main class="container py-4">
    <header id="topBar" class="d-flex justify-content-between align-items-center mb-4">
      <div class="d-flex align-items-center gap-3">
        <div class="brand-logo"><i class="bi bi-box2-heart-fill"></i></div>
        <div>
          <h1 class="brand mb-0">FoodBridge</h1>
          <p class="text-light small mb-0">Save surplus food • Support communities</p>
        </div>
      </div>
      <button id="logoutBtn" class="btn btn-light d-none">Logout</button>
    </header>

    <section id="authCard" class="card glass-card mx-auto" style="max-width: 900px;">
      <div class="card-body p-4 p-md-5">
        <div class="hero-banner mb-4">
          <div>
            <p class="hero-kicker mb-1">Food Rescue Network</p>
            <h2 class="mb-2">Discover unsold food from restaurants & bakeries</h2>
            <p class="mb-0">Reserve quickly, collect on time, and reduce waste responsibly.</p>
          </div>
          <div class="hero-icons">
            <span><i class="bi bi-shop"></i></span>
            <span><i class="bi bi-bicycle"></i></span>
            <span><i class="bi bi-stars"></i></span>
          </div>
        </div>

        <ul class="nav nav-pills mb-3" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="loginTab" type="button">Login</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="registerTab" type="button">Register</button>
          </li>
        </ul>

        <form id="loginForm" class="auth-form">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Role</label>
              <select class="form-select" id="loginRole" required>
                <option value="">Select role</option>
                <option value="donor">Donor</option>
                <option value="user">User</option>
                <option value="organization">Organization</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" id="loginPhone" required />
            </div>
            <div class="col-md-4">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="loginPassword" required />
            </div>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg">Login</button>
          </div>
        </form>

        <form id="registerForm" class="auth-form d-none">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Role</label>
              <select class="form-select" id="registerRole" required>
                <option value="">Select role</option>
                <option value="donor">Donor</option>
                <option value="user">User</option>
                <option value="organization">Organization</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Name / Restaurant / Organization</label>
              <input type="text" class="form-control" id="regName" required />
            </div>
            <div class="col-md-4">
              <label class="form-label">Profile Picture URL (optional)</label>
              <input type="url" class="form-control" id="regProfilePic" placeholder="https://..." />
            </div>

            <div id="commonFields" class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="regPhone" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Date of Birth (optional)</label>
                <input type="date" class="form-control" id="regDob" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" id="regAddress" required />
              </div>
              <div class="col-md-3">
                <label class="form-label">Pincode</label>
                <input type="text" class="form-control" id="regPincode" required />
              </div>
              <div class="col-md-7">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" id="regLocation" list="locationList" required />
              </div>
              <div class="col-md-2 d-grid">
                <label class="form-label invisible">Browse</label>
                <button class="btn btn-outline-primary" type="button" id="browseRegLocation">Browse</button>
              </div>
            </div>

            <div id="donorFields" class="row g-3 d-none">
              <div class="col-md-12">
                <label class="form-label">Restaurant Name</label>
                <input type="text" class="form-control" id="donorRestaurant" />
              </div>
            </div>

            <div id="organizationFields" class="row g-3 d-none">
              <div class="col-md-6">
                <label class="form-label">Organization Registration ID</label>
                <input type="text" class="form-control" id="orgId" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Legitimacy Proof Reference</label>
                <input type="text" class="form-control" id="orgProof" />
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="regPassword" required />
            </div>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-success btn-lg">Create Account</button>
          </div>
        </form>
      </div>
    </section>

    <datalist id="locationList">
      <option value="New York"></option>
      <option value="Los Angeles"></option>
      <option value="Chicago"></option>
      <option value="Houston"></option>
      <option value="Phoenix"></option>
      <option value="San Francisco"></option>
      <option value="Seattle"></option>
      <option value="Boston"></option>
    </datalist>

    <section id="dashboard" class="d-none">
      <div class="card glass-card mb-3">
        <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-2">
          <div>
            <h3 class="h5 mb-1" id="welcomeText"></h3>
            <p class="text-muted mb-0" id="roleText"></p>
          </div>
          <div class="d-flex gap-2 flex-wrap" id="topActions"></div>
        </div>
      </div>

      <div id="mainContent"></div>
    </section>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
